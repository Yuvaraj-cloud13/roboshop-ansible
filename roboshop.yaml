- name: roboshop instances management
  hosts : local
  connection: local
  vars:
    instances: ["mongodb", "mysql"]
    image_id: ami-0220d79f3f480ecf5
  tasks:
    - name: create ec2 instances
      amazon.aws.ec2_instance:
        name: "roboshop-{{ item }}"
        image_id: "{{ image_id }}"
        instance_type: t3.micro
        security_groups:
          - "Roboshop-{{ item }}"
          - roboshop-common
      loop: "{{ instances }}"
      register: ec2_output

    - name: print output
      debug:
        msg: "{{ ec2_output }}"
   